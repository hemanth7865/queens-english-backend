version: "3.9"

services:

  backend:
    build: ./schedule-api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
    restart: always

  frontend:
    build: ./qe-admin
    ports:
      - "8000:8000"
    environment:
      - API_URL=http://backend:5000
    depends_on:
      - backend
